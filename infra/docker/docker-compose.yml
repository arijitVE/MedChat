services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: documed
      MYSQL_USER: user1
      MYSQL_PASSWORD: pass123
      MYSQL_ROOT_PASSWORD: pass@123
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u user1 -ppass123"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 40s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ../../qdrant_storage:/qdrant/storage

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - ../../mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ../../storage/minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://user1:pass123@db:3306/documed
      MONGODB_URL: ${MONGODB_URL:-mongodb://mongo:27017}
      REDIS_URL: redis://redis:6379/0
      REDIS_RESULT_BACKEND: redis://redis:6379/1
      QDRANT_URL: http://qdrant:6333
      STORAGE_BACKEND: minio
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: documents-storage
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    environment:
      DATABASE_URL: mysql+pymysql://user1:pass123@db:3306/documed
      MONGODB_URL: ${MONGODB_URL:-mongodb://mongo:27017}
      REDIS_URL: redis://redis:6379/0
      REDIS_RESULT_BACKEND: redis://redis:6379/1
      QDRANT_URL: http://qdrant:6333
      STORAGE_BACKEND: minio
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: documents-storage
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: celery -A infra.queue.celery_config.celery_app worker --loglevel=info
