version: "3.8"

services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: hdmis
      MYSQL_USER: hdmis_user
      MYSQL_PASSWORD: hdmis_pass
      MYSQL_ROOT_PASSWORD: hdmis_root_pass
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u hdmis_user -phdmis_pass"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://hdmis_user:hdmis_pass@db:3306/hdmis
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    environment:
      DATABASE_URL: mysql+pymysql://hdmis_user:hdmis_pass@db:3306/hdmis
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A infra.queue.celery_config.celery_app worker --loglevel=info
