<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HDMIS Patient View</title>
  <style>
    :root {
      --ink: #17202a;
      --muted: #667085;
      --line: #d8dee8;
      --panel: #ffffff;
      --page: #f6f8fb;
      --brand: #266b5e;
      --brand-strong: #1d5147;
      --normal: #147a3f;
      --abnormal: #b54708;
      --danger: #b42318;
      --notice: #fff5c2;
      --notice-border: #e3ba38;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--page);
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 18px 24px;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 22px;
      display: grid;
      gap: 16px;
    }

    section,
    .disclaimer {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }

    .disclaimer {
      background: var(--notice);
      border-color: var(--notice-border);
      font-weight: 700;
      line-height: 1.5;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 220px 150px;
      gap: 12px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }

    input,
    button,
    textarea {
      width: 100%;
      border-radius: 6px;
      font: inherit;
      min-height: 42px;
    }

    input,
    textarea {
      border: 1px solid #bfc9d6;
      padding: 9px 10px;
      background: #fff;
      color: var(--ink);
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    button {
      border: 0;
      cursor: pointer;
      background: var(--brand);
      color: #fff;
      font-weight: 800;
      padding: 0 14px;
    }

    button:hover {
      background: var(--brand-strong);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.68;
    }

    .response-card {
      min-height: 104px;
      font-size: 19px;
      line-height: 1.6;
      background: #fbfefd;
      border-color: #cfe3dc;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    th,
    td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    th {
      background: #eef3f7;
      font-size: 13px;
      color: #3c4856;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .status {
      display: inline-block;
      border-radius: 999px;
      padding: 4px 10px;
      font-weight: 800;
      font-size: 13px;
    }

    .status.normal {
      color: var(--normal);
      background: #e7f6ec;
    }

    .status.abnormal {
      color: var(--abnormal);
      background: #fff2e2;
    }

    .status.caution {
      color: var(--danger);
      background: #fff0ee;
    }

    .loading {
      min-height: 20px;
      margin-top: 10px;
      color: var(--abnormal);
      font-weight: 800;
    }

    .error {
      display: none;
      margin-top: 12px;
      border: 1px solid #f1b8b2;
      border-radius: 8px;
      padding: 12px;
      color: var(--danger);
      background: #fff5f4;
      font-weight: 700;
    }

    @media (max-width: 760px) {
      main {
        padding: 14px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      th,
      td {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>HDMIS Patient View</h1>
  </header>

  <main>
    <div class="disclaimer" id="disclaimer-top"></div>

    <section>
      <h2>Ask About Your Results</h2>
      <form id="patient-query-form" class="grid">
        <label>
          Ask about your results
          <textarea id="patient-query-text" placeholder="What does my blood test mean?"></textarea>
        </label>
        <label>
          Patient ID
          <input id="patient-id" placeholder="test-patient-001">
        </label>
        <button id="patient-query-button" type="submit">Submit</button>
      </form>
      <div id="patient-loading" class="loading"></div>
      <div id="patient-error" class="error"></div>
    </section>

    <section class="response-card">
      <h2>Response</h2>
      <div id="patient-response">Your explanation will appear here.</div>
    </section>

    <section>
      <h2>Field Status</h2>
      <table>
        <thead>
          <tr>
            <th>Test Name</th>
            <th>Your Result</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="field-table-body">
          <tr>
            <td colspan="3">No fields loaded yet.</td>
          </tr>
        </tbody>
      </table>
    </section>

    <div class="disclaimer" id="disclaimer-bottom"></div>
  </main>

  <script>
    const API_BASE = window.location.protocol === "file:" ? "http://127.0.0.1:8000" : "";
    const DISCLAIMER = "This explanation is for informational purposes only and does not constitute medical advice. Please consult your doctor for interpretation and treatment decisions.";

    document.getElementById("disclaimer-top").textContent = DISCLAIMER;
    document.getElementById("disclaimer-bottom").textContent = DISCLAIMER;

    function setLoading(message) {
      document.getElementById("patient-loading").textContent = message || "";
    }

    function setError(message) {
      const el = document.getElementById("patient-error");
      el.textContent = message || "";
      el.style.display = message ? "block" : "none";
    }

    async function requestJson(path, options = {}) {
      const response = await fetch(`${API_BASE}${path}`, {
        headers: { "Content-Type": "application/json", ...(options.headers || {}) },
        ...options
      });
      if (!response.ok) {
        const text = await response.text();
        throw new Error(text || `Request failed with ${response.status}`);
      }
      return response.json();
    }

    document.getElementById("patient-query-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      setError("");
      setLoading("Loading your explanation...");
      const button = document.getElementById("patient-query-button");
      button.disabled = true;

      try {
        const data = await requestJson("/api/patient/query", {
          method: "POST",
          body: JSON.stringify({
            text: document.getElementById("patient-query-text").value,
            persona: "patient",
            patient_id: document.getElementById("patient-id").value || null
          })
        });
        renderPatientResult(data);
      } catch (error) {
        setError(error.message);
      } finally {
        button.disabled = false;
        setLoading("");
      }
    });

    function renderPatientResult(result) {
      document.getElementById("patient-response").textContent = result.response || "No response returned.";
      document.getElementById("disclaimer-top").textContent = result.disclaimer || DISCLAIMER;
      document.getElementById("disclaimer-bottom").textContent = result.disclaimer || DISCLAIMER;

      const body = document.getElementById("field-table-body");
      const fields = result.simplified_fields || [];
      if (!fields.length) {
        body.innerHTML = '<tr><td colspan="3">No field details returned.</td></tr>';
        return;
      }

      body.innerHTML = fields.map((field) => {
        const status = field.status || field.plain_english_status || "See doctor";
        const statusClass = status.toLowerCase().includes("within")
          ? "normal"
          : status.toLowerCase().includes("outside")
            ? "abnormal"
            : "caution";
        return `
          <tr>
            <td>${escapeHtml(field.name || "")}</td>
            <td>${escapeHtml(field.value || "")}</td>
            <td><span class="status ${statusClass}">${escapeHtml(status)}</span></td>
          </tr>
        `;
      }).join("");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
