<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HDIMS Doctor Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --ink: #1b2430;
      --muted: #627084;
      --line: #d9e0e8;
      --panel: #ffffff;
      --page: #f4f7fa;
      --brand: #176b87;
      --brand-strong: #0f4f63;
      --green: #14804a;
      --red: #b42318;
      --amber: #b54708;
      --blue-soft: #e8f4f8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--page);
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 18px 28px;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      gap: 18px;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    input,
    select,
    button,
    textarea {
      width: 100%;
      border: 1px solid #bcc8d6;
      border-radius: 6px;
      font: inherit;
      min-height: 40px;
    }

    input,
    select,
    textarea {
      padding: 9px 10px;
      background: #fff;
      color: var(--ink);
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      cursor: pointer;
      border: 0;
      background: var(--brand);
      color: white;
      font-weight: 700;
      padding: 0 16px;
    }

    button:hover {
      background: var(--brand-strong);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.68;
    }

    .span-2 {
      grid-column: span 2;
    }

    .span-4 {
      grid-column: span 4;
    }

    .result-card,
    .insight,
    .error {
      margin-top: 14px;
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 14px;
      background: #fbfdff;
    }

    .result-card pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.5;
    }

    .error {
      display: none;
      color: var(--red);
      border-color: #f1b8b2;
      background: #fff5f4;
    }

    .chart-shell {
      position: relative;
      height: 360px;
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }

    .loading {
      color: var(--amber);
      font-weight: 700;
      font-size: 13px;
      min-height: 20px;
      margin-top: 10px;
    }

    @media (max-width: 860px) {
      main {
        padding: 14px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .span-2,
      .span-4 {
        grid-column: span 1;
      }

      .chart-shell {
        height: 300px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>HDIMS Doctor Dashboard</h1>
  </header>

  <main>
    <section>
      <h2>Query</h2>
      <form id="doctor-query-form" class="grid">
        <label class="span-2">
          Query
          <textarea id="doctor-query-text" placeholder="Ask a clinical retrieval, reasoning, or trend question"></textarea>
        </label>
        <label>
          Persona
          <select id="doctor-persona" disabled>
            <option value="doctor" selected>doctor</option>
          </select>
        </label>
        <label>
          Patient ID
          <input id="doctor-query-patient" placeholder="test-patient-001">
        </label>
        <button id="doctor-query-button" type="submit" class="span-4">Submit Query</button>
      </form>
      <div id="doctor-query-loading" class="loading"></div>
      <div id="doctor-query-error" class="error"></div>
      <div class="result-card">
        <pre id="doctor-query-result">{}</pre>
      </div>
    </section>

    <section>
      <h2>Patient Summary</h2>
      <form id="summary-form" class="grid">
        <label class="span-2">
          Patient ID
          <input id="summary-patient" placeholder="test-patient-001">
        </label>
        <button id="summary-button" type="submit">Load Summary</button>
      </form>
      <div id="summary-loading" class="loading"></div>
      <div id="summary-error" class="error"></div>
      <div class="chart-shell">
        <canvas id="summary-chart"></canvas>
      </div>
      <div id="summary-insight" class="insight">AI insight will appear here.</div>
    </section>

    <section>
      <h2>Trend Viewer</h2>
      <form id="trend-form" class="grid">
        <label>
          Patient ID
          <input id="trend-patient" placeholder="test-patient-001">
        </label>
        <label>
          Field Name
          <input id="trend-field" placeholder="hemoglobin">
        </label>
        <button id="trend-button" type="submit">Load Trend</button>
      </form>
      <div id="trend-loading" class="loading"></div>
      <div id="trend-error" class="error"></div>
      <div class="chart-shell">
        <canvas id="trend-chart"></canvas>
      </div>
      <div id="trend-insight" class="insight">Trend insight will appear here.</div>
    </section>
  </main>

  <script>
    const API_BASE = window.location.protocol === "file:" ? "http://127.0.0.1:8000" : "";
    let summaryChart = null;
    let trendChart = null;

    const referenceMarkerPlugin = {
      id: "referenceMarkerPlugin",
      afterDatasetsDraw(chart) {
        const refs = chart.options.plugins.referenceMarkers;
        if (!refs) return;
        const meta = chart.getDatasetMeta(0);
        const yScale = chart.scales.y;
        const ctx = chart.ctx;
        const drawMarker = (value, x, width, color) => {
          if (value === null || value === undefined || Number.isNaN(Number(value))) return;
          const y = yScale.getPixelForValue(Number(value));
          ctx.save();
          ctx.strokeStyle = color;
          ctx.lineWidth = 2;
          ctx.setLineDash([5, 5]);
          ctx.beginPath();
          ctx.moveTo(x - width / 2, y);
          ctx.lineTo(x + width / 2, y);
          ctx.stroke();
          ctx.restore();
        };
        meta.data.forEach((bar, index) => {
          const width = Math.max(bar.width || 24, 24);
          drawMarker(refs.low[index], bar.x, width, "#14804a");
          drawMarker(refs.high[index], bar.x, width, "#b42318");
        });
      }
    };

    const normalBandPlugin = {
      id: "normalBandPlugin",
      beforeDatasetsDraw(chart) {
        const band = chart.options.plugins.normalBand;
        if (!band || band.refLow == null || band.refHigh == null) return;
        const yScale = chart.scales.y;
        const area = chart.chartArea;
        const low = yScale.getPixelForValue(Number(band.refLow));
        const high = yScale.getPixelForValue(Number(band.refHigh));
        const top = Math.min(low, high);
        const bottom = Math.max(low, high);
        const ctx = chart.ctx;
        ctx.save();
        ctx.fillStyle = "rgba(20, 128, 74, 0.12)";
        ctx.fillRect(area.left, top, area.right - area.left, bottom - top);
        ctx.strokeStyle = "rgba(20, 128, 74, 0.75)";
        ctx.setLineDash([6, 5]);
        ctx.beginPath();
        ctx.moveTo(area.left, low);
        ctx.lineTo(area.right, low);
        ctx.moveTo(area.left, high);
        ctx.lineTo(area.right, high);
        ctx.stroke();
        ctx.restore();
      }
    };

    Chart.register(referenceMarkerPlugin, normalBandPlugin);

    function setLoading(id, message) {
      document.getElementById(id).textContent = message || "";
    }

    function setError(id, message) {
      const el = document.getElementById(id);
      el.textContent = message || "";
      el.style.display = message ? "block" : "none";
    }

    async function requestJson(path, options = {}) {
      const response = await fetch(`${API_BASE}${path}`, {
        headers: { "Content-Type": "application/json", ...(options.headers || {}) },
        ...options
      });
      if (!response.ok) {
        const text = await response.text();
        throw new Error(text || `Request failed with ${response.status}`);
      }
      return response.json();
    }

    document.getElementById("doctor-query-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      setError("doctor-query-error", "");
      setLoading("doctor-query-loading", "Submitting query...");
      const button = document.getElementById("doctor-query-button");
      button.disabled = true;
      try {
        const data = await requestJson("/api/doctor/query", {
          method: "POST",
          body: JSON.stringify({
            text: document.getElementById("doctor-query-text").value,
            persona: "doctor",
            patient_id: document.getElementById("doctor-query-patient").value || null
          })
        });
        document.getElementById("doctor-query-result").textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        setError("doctor-query-error", error.message);
      } finally {
        button.disabled = false;
        setLoading("doctor-query-loading", "");
      }
    });

    document.getElementById("summary-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      setError("summary-error", "");
      setLoading("summary-loading", "Loading summary...");
      const button = document.getElementById("summary-button");
      button.disabled = true;
      try {
        const patientId = encodeURIComponent(document.getElementById("summary-patient").value);
        const data = await requestJson(`/api/doctor/patient/${patientId}/summary`);
        renderSummary(data);
      } catch (error) {
        setError("summary-error", error.message);
      } finally {
        button.disabled = false;
        setLoading("summary-loading", "");
      }
    });

    document.getElementById("trend-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      setError("trend-error", "");
      setLoading("trend-loading", "Loading trend...");
      const button = document.getElementById("trend-button");
      button.disabled = true;
      try {
        const patientId = encodeURIComponent(document.getElementById("trend-patient").value);
        const field = encodeURIComponent(document.getElementById("trend-field").value);
        const data = await requestJson(`/api/doctor/patient/${patientId}/trend?field_name=${field}`);
        renderTrend(data);
      } catch (error) {
        setError("trend-error", error.message);
      } finally {
        button.disabled = false;
        setLoading("trend-loading", "");
      }
    });

    function renderSummary(result) {
      const chartJson = result.chart_json || { data: {}, meta: {} };
      const data = chartJson.data || {};
      const labels = data.fields || [];
      const values = data.values || [];
      const refLow = data.ref_low || [];
      const refHigh = data.ref_high || [];
      const ctx = document.getElementById("summary-chart");
      if (summaryChart) summaryChart.destroy();
      summaryChart = new Chart(ctx, {
        type: "bar",
        data: {
          labels,
          datasets: [{
            label: "Numeric value",
            data: values,
            backgroundColor: "#176b87",
            borderColor: "#0f4f63",
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: true },
            tooltip: { mode: "index", intersect: false },
            referenceMarkers: { low: refLow, high: refHigh }
          },
          scales: {
            x: { ticks: { maxRotation: 45, minRotation: 0 } },
            y: { beginAtZero: true }
          }
        }
      });
      document.getElementById("summary-insight").textContent = result.ai_insight || "No insight returned.";
    }

    function renderTrend(result) {
      const chartJson = result.chart_json || { data: {}, meta: {} };
      const data = chartJson.data || {};
      const meta = chartJson.meta || {};
      const ctx = document.getElementById("trend-chart");
      if (trendChart) trendChart.destroy();
      trendChart = new Chart(ctx, {
        type: "line",
        data: {
          labels: data.x || [],
          datasets: [{
            label: `${meta.label || result.field_name} ${meta.unit ? `(${meta.unit})` : ""}`,
            data: data.y || [],
            borderColor: "#176b87",
            backgroundColor: "rgba(23, 107, 135, 0.16)",
            tension: 0.25,
            pointRadius: 4,
            fill: false
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: true },
            normalBand: { refLow: meta.ref_low, refHigh: meta.ref_high }
          },
          scales: {
            y: { beginAtZero: false }
          }
        }
      });
      document.getElementById("trend-insight").textContent = result.insight || "No trend insight returned.";
    }
  </script>
</body>
</html>
